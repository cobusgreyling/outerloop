name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Verify npm publish credentials
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is not set. CI cannot publish to npm."
            echo "Fix: create an Automation token at https://www.npmjs.com/settings/tokens"
            echo "Then: gh secret set NPM_TOKEN --repo cobusgreyling/outerloop"
            echo "Or link npm → GitHub Actions (creates NPM_<id> secret automatically)"
            echo "See docs/PUBLISHING.md"
            exit 1
          fi
          echo "npm auth token is set (length ${#NPM_TOKEN})"
          npm whoami
          echo "Token must be Classic → Automation (bypasses 2FA). Granular/Publish tokens fail with EOTP in CI."

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run version:ci
          publish: pnpm run release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ env.NPM_TOKEN }}